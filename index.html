<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodHub 🍽️</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fff5f0;
}

header {
    background: #ff3d00;
    color: white;
    padding: 20px;
    text-align: center;
}

h2 {
    margin-top: 10px;
}

.container {
    padding: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 8px;
    background: #ff3d00;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 5px;
}

#cartBox {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    border-top: 3px solid #ff3d00;
    padding: 15px;
    box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin: 5px 0;
}

.total {
    font-weight: bold;
    font-size: 18px;
}

.pay-btn {
    background: green;
}

</style></head><body><header>
<h1>🍔 FoodHub</h1>
<p>Order Food Like Zomato 🍕</p>
</header><div class="container">
<h2>Menu</h2>
<div class="grid" id="menu"></div>
</div><div id="cartBox">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<p class="total">Total: ₹<span id="total">0</span></p>
<button class="pay-btn" onclick="payNow()">Pay Now</button>
</div><script>
const foodItems = [
{name:'Pizza', price:200, img:'https://source.unsplash.com/200x150/?pizza'},
{name:'Burger', price:150, img:'https://source.unsplash.com/200x150/?burger'},
{name:'Sandwich', price:120, img:'https://source.unsplash.com/200x150/?sandwich'},
{name:'French Fries', price:100, img:'https://source.unsplash.com/200x150/?fries'},
{name:'Pasta', price:180, img:'https://source.unsplash.com/200x150/?pasta'},
{name:'Ice Cream', price:90, img:'https://source.unsplash.com/200x150/?icecream'}
];

let cart = [];

function loadMenu() {
let menu = document.getElementById('menu');
menu.innerHTML = '';

foodItems.forEach((item, index) => {
let div = document.createElement('div');
div.className = 'card';
div.innerHTML = `
<img src="${item.img}">
<h3>${item.name}</h3>
<p>₹${item.price}</p>
<button onclick="addToCart(${index})">Add</button>
`;
menu.appendChild(div);
});
}

function addToCart(index) {
cart.push(foodItems[index]);
updateCart();
}

function updateCart() {
let cartDiv = document.getElementById('cartItems');
cartDiv.innerHTML = '';

let total = 0;

cart.forEach((item, i) => {
let div = document.createElement('div');
div.className = 'cart-item';
div.innerHTML = `
<span>${item.name} - ₹${item.price}</span>
<button onclick="removeItem(${i})">❌</button>
`;
cartDiv.appendChild(div);

total += item.price;
});

document.getElementById('total').textContent = total;
}

function removeItem(i) {
cart.splice(i, 1);
updateCart();
}

function payNow() {
if(cart.length === 0) {
alert('Cart is empty!');
return;
}

let total = cart.reduce((sum, item) => sum + item.price, 0);
alert('Payment Successful! ₹' + total);
cart = [];
updateCart();
}

loadMenu();
</script></body>
</html>
